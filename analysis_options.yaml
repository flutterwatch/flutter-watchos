include: flutter/packages/flutter_tools/analysis_options.yaml

analyzer:
  exclude:
    - "flutter/bin/cache/**"
    - "flutter/dev/**"
    - "flutter/examples/**"
    - "flutter/packages/flutter/**"
    - "flutter/packages/flutter_driver/**"
    - "flutter/packages/flutter_goldens/**"
    - "flutter/packages/flutter_localizations/**"
    - "flutter/packages/flutter_test/**"
    - "flutter/packages/flutter_web_plugins/**"
    - "flutter/packages/fuchsia_remote_debug_protocol/**"
    - "flutter/packages/integration_test/**"
    # `proxy_root/` contains symlinks pointing into `flutter/packages/...`. The
    # globs above don't match through symlinks, so analyse-resolved paths still
    # land in the SDK trees. Exclude the proxy tree explicitly.
    - "proxy_root/**"
    # `packages/` holds the first-party `flutter_watchos` Flutter plugin — a
    # separate package with its own pubspec + analysis_options (flutter_test,
    # flutter_lints). The CLI's root analyze must not pull it in: on a clean
    # checkout its deps aren't resolved, so `expect`/`test`/widget types read
    # as undefined and fail CI. It is analysed on its own, from its own dir.
    - "packages/**"

linter:
  rules:
    implementation_imports: false
